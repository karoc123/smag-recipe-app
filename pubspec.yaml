name: smag
description: "SMAG – Simple Markdown Archive & Grid. A quiet, local-first recipe manager."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  provider: ^6.1.2
  path_provider: ^2.1.5
  sqflite: ^2.4.2
  toml: ^0.16.0
  wakelock_plus: ^1.3.2
  google_fonts: ^6.2.1
  file_picker: ^9.2.1
  flutter_markdown: ^0.7.7
  http: ^1.4.0
  html: ^0.15.5
  path: ^1.9.1
  shared_preferences: ^2.3.5
  webdav_client: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  generate: true
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: smag_app_icon.png
  adaptive_icon_foreground: smag_app_icon.png
  adaptive_icon_background: "#F5F2ED"
  remove_alpha_ios: true
